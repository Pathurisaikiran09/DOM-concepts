<!DOCTYPE html>
<html>
    <head>
        <title>DOM Animation</title>
        <style>
            #container{
                width: 300px;
                height: 300px;
                position: relative;
                background: aqua;
            }
            #animate{
                width: 50px;
                height: 50px;
                position: absolute;
                background: black;
            }
        </style>
    </head>
        <body>
    <h2> Animation</h2>
   <p> <button onclick="moveBox()">Click me</button></p>
    <div id="container">
        <div id="animate"></div>
    </div>
        </body>
<script>
function moveBox(){
    let id=null;
    const elem=document.getElementById("animate");
    let pos=0;
    clearInterval(id);
    id=setInterval(frame,5);
    function frame(){
        if(pos>=250){
            clearInterval(id);
        }else{
            pos++;
            elem.style.top= pos+"px";
            elem.style.left=pos+"px";
        }
    }

}
</script>

</html>
